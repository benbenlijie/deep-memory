<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">deep-memory logo</title>
  <desc id="desc">A rounded local memory cell containing inspectable stacked records, with a cyan inspection window and green accepted-memory dot.</desc>
  <defs>
    <linearGradient id="cell-bg" x1="40" y1="24" x2="216" y2="232" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f172a"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="record-fill" x1="74" y1="77" x2="183" y2="176" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="256" height="256" fill="none"/>

  <!-- Local bounded scope -->
  <rect x="32" y="28" width="192" height="200" rx="44" fill="url(#cell-bg)" stroke="#334155" stroke-width="2" filter="url(#shadow)"/>

  <!-- Subtle local grid / inspectable surface -->
  <path d="M64 68H192" stroke="#1e293b" stroke-width="1"/>
  <path d="M64 188H192" stroke="#1e293b" stroke-width="1"/>
  <path d="M68 64V192" stroke="#1e293b" stroke-width="1"/>
  <path d="M188 64V192" stroke="#1e293b" stroke-width="1"/>

  <!-- Durable local records / SQLite-like layers -->
  <rect x="72" y="78" width="112" height="28" rx="14" fill="url(#record-fill)" stroke="#64748b" stroke-width="2"/>
  <rect x="72" y="114" width="112" height="28" rx="14" fill="url(#record-fill)" stroke="#64748b" stroke-width="2"/>
  <rect x="72" y="150" width="112" height="28" rx="14" fill="url(#record-fill)" stroke="#64748b" stroke-width="2"/>

  <!-- Record fields -->
  <circle cx="92" cy="92" r="5" fill="#94a3b8"/>
  <path d="M108 92H156" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="92" cy="128" r="5" fill="#94a3b8"/>
  <path d="M108 128H148" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="92" cy="164" r="5" fill="#94a3b8"/>
  <path d="M108 164H160" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>

  <!-- Inspection window / retrieval lens -->
  <rect x="138" y="62" width="56" height="56" rx="18" fill="#082f49" stroke="#38bdf8" stroke-width="4"/>
  <circle cx="166" cy="90" r="13" stroke="#7dd3fc" stroke-width="5"/>
  <path d="M176 100L188 112" stroke="#7dd3fc" stroke-width="5" stroke-linecap="round"/>

  <!-- Governed accepted memory write -->
  <circle cx="178" cy="172" r="16" fill="#064e3b" stroke="#34d399" stroke-width="4"/>
  <path d="M170 172L176 178L187 165" stroke="#a7f3d0" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Quiet project initial as infrastructure mark, not wordmark -->
  <path d="M72 206H184" stroke="#334155" stroke-width="2" stroke-linecap="round"/>
</svg>
