<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" font-family="JetBrains Mono, Fira Code, SF Mono, Monaco, Consolas, Courier New, monospace">
  <title>deep-memory — Hex Accent</title>
  <defs>
    <filter id="cyanGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect x="3" y="3" width="14" height="14" rx="2" fill="#0ea5e9" opacity="0.09"/>
    </pattern>
  </defs>

  <rect width="900" height="240" fill="#060a12"/>
  <rect width="900" height="240" fill="url(#grid)"/>

  <!-- lit memory cells (squares) — scattered, 03 rhythm, 25 cells -->
  <g fill="#22d3ee">
    <!-- left cluster -->
    <rect x="63"  y="63"  width="14" height="14" rx="2" opacity="0.9"/>
    <rect x="83"  y="63"  width="14" height="14" rx="2" opacity="0.5"/>
    <rect x="183" y="63"  width="14" height="14" rx="2" opacity="0.45"/>
    <rect x="243" y="63"  width="14" height="14" rx="2" opacity="0.8"/>
    <rect x="43"  y="83"  width="14" height="14" rx="2" opacity="0.5"/>
    <rect x="103" y="83"  width="14" height="14" rx="2" opacity="0.95"/>
    <rect x="163" y="83"  width="14" height="14" rx="2" opacity="0.55"/>
    <rect x="63"  y="103" width="14" height="14" rx="2" opacity="0.7"/>
    <rect x="203" y="103" width="14" height="14" rx="2" opacity="0.5"/>
    <rect x="83"  y="123" width="14" height="14" rx="2" opacity="0.85"/>
    <rect x="163" y="123" width="14" height="14" rx="2" opacity="0.6"/>
    <rect x="43"  y="163" width="14" height="14" rx="2" opacity="0.45"/>
    <!-- right cluster -->
    <rect x="623" y="63"  width="14" height="14" rx="2" opacity="0.85"/>
    <rect x="743" y="63"  width="14" height="14" rx="2" opacity="0.5"/>
    <rect x="803" y="63"  width="14" height="14" rx="2" opacity="0.55"/>
    <rect x="843" y="63"  width="14" height="14" rx="2" opacity="0.8"/>
    <rect x="643" y="83"  width="14" height="14" rx="2" opacity="0.6"/>
    <rect x="703" y="83"  width="14" height="14" rx="2" opacity="0.95"/>
    <rect x="783" y="83"  width="14" height="14" rx="2" opacity="0.7"/>
    <rect x="823" y="83"  width="14" height="14" rx="2" opacity="0.5"/>
    <rect x="663" y="103" width="14" height="14" rx="2" opacity="0.9"/>
    <rect x="823" y="103" width="14" height="14" rx="2" opacity="0.85"/>
    <rect x="783" y="123" width="14" height="14" rx="2" opacity="0.9"/>
    <rect x="703" y="143" width="14" height="14" rx="2" opacity="0.75"/>
    <rect x="643" y="163" width="14" height="14" rx="2" opacity="0.5"/>
  </g>

  <!-- HEX ACCENTS — 7 cells resolved to their stored byte, crisp (no filter) -->
  <g font-size="11" font-weight="700" fill="#22d3ee" text-anchor="middle" dominant-baseline="central" letter-spacing="0">
    <text x="150" y="70"  opacity="0.95">64</text>
    <text x="230" y="90"  opacity="0.9">65</text>
    <text x="130" y="110" opacity="0.95">70</text>
    <text x="690" y="70"  opacity="1.0">2D</text>
    <text x="750" y="110" opacity="0.9">6D</text>
    <text x="710" y="150" opacity="0.95">6F</text>
    <text x="810" y="170" opacity="1.0">79</text>
  </g>

  <!-- wordmark — hero, with glow -->
  <g filter="url(#cyanGlow)">
    <text x="450" y="140" text-anchor="middle" font-size="62" font-weight="700" fill="#22d3ee" letter-spacing="-1">deep-memory</text>
  </g>
  <text x="450" y="176" text-anchor="middle" font-size="16" fill="#0e7490" letter-spacing="3">SQLITE · FTS5 · ADDRESSED</text>
</svg>
